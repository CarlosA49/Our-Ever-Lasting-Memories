<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locations — Our Ever Lasting Memories</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="Locations.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDIZRXygES1o9YtkaorB8e6vPs8omT3wJc&libraries=places&callback=initMap"
        async defer></script>
    <script>
        let map;
        let userMarker;
        let userLocation;

        const locations = [
            { lat: 14.592450, lng: 120.973320, title: 'Philippines, Intramuros / Our Late Night Walk' },
            { lat: 14.3261696, lng: 120.9368576, title: 'Carlos Dasma Home' },
            { lat: 14.6753, lng: 120.9389, title: 'Ishi Tanza Home' },
            { lat: 14.57270622253418, lng: 120.9912109375, title: 'Carlos Taft Manila Condo Home' },
            { lat: 14.5667, lng: 120.9833, title: 'Ishi Taft Manila Condo Home' },
            { lat: 14.5649439, lng: 120.9930992, title: 'Ishi School, De La Salle University Taft Manila' },
            { lat: 14.576686, lng: 120.983879, title: 'Robinsons Place Manila / Our chill place' },
            { lat: 14.5872244, lng: 120.9819008, title: 'Rizal Park / Our Late Night Walks' },
            { lat: 14.5897886, lng: 120.9831156, title: 'SM City Manila' },
            { lat: 14.5942438, lng: 120.9819045, title: 'Arroceros Forest Park' },
            { lat: 14.5905004, lng: 120.9780808, title: 'Carlos School, Mapúa University Manila' },
            { lat: 14.5926205, lng: 120.9731515, title: 'Manila Cathedral, Intramuros / Our Monthsary Date and Late Night walks' },
            { lat: 14.5938751, lng: 120.9706147, title: 'Fort Santiago, Intramuros / My Birthday celebration' },
            { lat: 14.597106, lng: 120.976567, title: 'China Town Arch' },
            { lat: 14.6005329, lng: 120.973663, title: 'China Town Park' },
            { lat: 14.6026121, lng: 120.9703526, title: 'Divisoria Mall' },
            { lat: 14.603165, lng: 120.973563, title: 'Divisoria, Lucky Chinatown Mall' },
            { lat: 14.5662956, lng: 120.9883233, title: 'Manila Zoo / Our Valentines Date' },
            { lat: 14.5531561, lng: 121.0218021, title: 'Greenbelt, Makati / 6th Monthsary date' },
            { lat: 14.5579819, lng: 121.0238229, title: 'Makati, Salcedo' },
            { lat: 14.5101249, lng: 120.9913011, title: 'PITX' },
            { lat: 14.4261426, lng: 120.9465338, title: 'MCI Hospital, Imus Cavite, Philippines' },
            { lat: 14.418999, lng: 120.9393152, title: 'Our Lady of Hospital, Imus Cavite, Philippines' },
            { lat: 14.4173731, lng: 120.9378027, title: 'Carlos Imus Home' },
            { lat: 14.5596987, lng: 120.9861464, title: 'ASEAN Garden' },
            { lat: 14.5688734, lng: 120.9838605, title: 'Rajah Sulayman Park / Early Dates / Late Night walks' },
            { lat: 14.577771, lng: 120.9857069, title: 'Philippine General Manila Hospital' },
            { lat: 14.5703571, lng: 120.9865207, title: 'Remedios Circle / Late Night Walks' },
            { lat: 14.6561126, lng: 121.0669229, title: 'UP Sunken Garden / UP Fair' },
            { lat: 14.5541257, lng: 121.0184605, title: 'Washington Sycip Park / Our First Night walk in Makati and our 6th Monthsary' },
            { lat: 14.5677821, lng: 120.9933878, title: 'The Sherwood Place / our go to chill place' },
            { lat: 14.5813346, lng: 120.9860079, title: 'Cathedral of Praise — Main Campus / our romantic dates / walking marathon' },
            { lat: 14.5699293, lng: 120.9887253, title: 'Puregold San Andres / your wet market photoshoot' },
            { lat: 14.5661865, lng: 120.9893832, title: 'Paraiso ng Batang Maynila / Our OG Park' },
            { lat: 14.5344077, lng: 120.9984558, title: 'Baclaran / where you bought two of your pajamas' },
            { lat: 14.631620, lng: 121.032830, title: "Ishi's bestfriends / Louis Graduation party" }
        ];

        function initMap() {
            const mapEl = document.getElementById('map');
            if (!mapEl) return;
            map = new google.maps.Map(mapEl, {
                zoom: 11,
                center: { lat: 14.5995, lng: 120.9842 },
                styles: [
                    { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'simplified' }] },
                    { featureType: 'water', stylers: [{ color: '#cfe6f4' }] },
                    { featureType: 'landscape', stylers: [{ color: '#fff5fa' }] }
                ]
            });

            const counterEl = document.getElementById('loc-count');
            if (counterEl) counterEl.textContent = locations.length;

            locations.forEach(location => {
                const marker = new google.maps.Marker({
                    position: { lat: location.lat, lng: location.lng },
                    map: map,
                    title: location.title,
                    animation: google.maps.Animation.DROP,
                    icon: {
                        path: 'M12 2C7.589 2 4 5.589 4 10c0 6.5 8 12 8 12s8-5.5 8-12c0-4.411-3.589-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z',
                        fillColor: '#d94d94',
                        fillOpacity: 1,
                        strokeColor: '#fff',
                        strokeWeight: 2,
                        scale: 1.5,
                        anchor: new google.maps.Point(12, 22)
                    }
                });

                const infoWindow = new google.maps.InfoWindow({
                    content: `<div style="font-family:Poppins,sans-serif;color:#3a1f33;max-width:240px;">
                                <strong style="color:#b3357a;">${location.title}</strong>
                              </div>`
                });

                marker.addListener('click', () => infoWindow.open(map, marker));
            });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                        userMarker = new google.maps.Marker({
                            position: userLocation,
                            map: map,
                            title: 'You are here ♥'
                        });
                        trackUserLocation();
                    },
                    () => { /* silently ignore — user denied */ }
                );
            }
            initAutocomplete();
        }

        function trackUserLocation() {
            navigator.geolocation.watchPosition(
                (position) => {
                    userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                    if (userMarker) userMarker.setPosition(userLocation);
                },
                (error) => console.warn('Watch error:', error),
                { enableHighAccuracy: true, maximumAge: 30000, timeout: 27000 }
            );
        }

        function searchLocation() {
            const address = document.getElementById('location-input').value;
            if (!address || !window.google) return;
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ address: address }, (results, status) => {
                if (status === 'OK' && results.length) {
                    map.setCenter(results[0].geometry.location);
                    map.setZoom(15);
                    new google.maps.Marker({ map: map, position: results[0].geometry.location });
                } else {
                    alert('Location not found, pookie: ' + status);
                }
            });
        }

        function filterSuggestions() {
            const input = document.getElementById('location-input').value.toLowerCase();
            const box = document.getElementById('suggestions');
            box.innerHTML = '';
            if (!input) { box.style.display = 'none'; return; }
            const matches = locations.filter(l => l.title.toLowerCase().includes(input)).slice(0, 8);
            if (!matches.length) { box.style.display = 'none'; return; }
            matches.forEach(loc => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.textContent = loc.title;
                item.onclick = () => {
                    document.getElementById('location-input').value = loc.title;
                    box.innerHTML = ''; box.style.display = 'none';
                    if (map) {
                        map.setCenter({ lat: loc.lat, lng: loc.lng });
                        map.setZoom(16);
                    }
                };
                box.appendChild(item);
            });
            box.style.display = 'block';
        }

        function initAutocomplete() {
            const input = document.getElementById('location-input');
            if (!input || !google.maps.places) return;
            const ac = new google.maps.places.Autocomplete(input);
            ac.setComponentRestrictions({ country: ['ph'] });
            ac.addListener('place_changed', () => {
                const place = ac.getPlace();
                if (place.geometry) {
                    map.setCenter(place.geometry.location);
                    map.setZoom(16);
                    new google.maps.Marker({ position: place.geometry.location, map });
                }
            });
        }
    </script>
</head>
<body class="has-fixed-nav locations-page">
    <div id="site-nav"></div>

    <main class="locations-main">
        <header class="locations-hero reveal">
            <h1>Our Memory Map</h1>
            <p class="muted">
                <span id="loc-count">35</span> places we've made memories — every café, walk, and
                spontaneous detour, pinned with love.
            </p>
        </header>

        <div class="locations-search reveal" data-delay="1">
            <input type="text" id="location-input" placeholder="Search a place, pookie…" oninput="filterSuggestions()" autocomplete="off">
            <button class="btn" onclick="searchLocation()">Search</button>
            <div id="suggestions"></div>
        </div>

        <div id="map" class="reveal" data-delay="2" aria-label="Map of our locations"></div>

        <p class="map-hint reveal" data-delay="3">
            Click any pink heart pin to read the memory attached to it.
            Allow location access if you'd like to see where you are on the map.
        </p>
    </main>

    <div id="site-footer"></div>
    <script src="site.js" defer></script>
</body>
</html>
